<!DOCTYPE html>
<html lang="ar" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign_Up-TECH</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <header>
        <nav class="container">
            <div class="logo">TECH SHOP</div>
            <ul class="nav-links">
                <li><a href="signup.html">Sign_in</a></li>
                <li><a href="home.html">Home</a></li>
                <li><a href="contact.html">Contact_Us</a></li>
            </ul>
        </nav>
    </header>
    <div class="auth-container">
        <form class="auth-form" onsubmit="event.preventDefault(); signup();">
            <h2><i class="fas fa-user-plus"></i>Creat Account</h2>

            <div class="form-group">
                <label>username</label>
                <input type="text" id="signup-username" required>
            </div>

            <div class="form-group">
                <label>password</label>
                <input type="password" id="signup-password" required>
            </div>

            <div class="form-group">
                <button type="submit" class="btn" id="signup-btn">Sign</button>
            </div>

            <div class="error" id="signup-error"></div>

            <p style="text-align: center; margin-top: 1rem;">
                Do you have an account?<a href="signin.html">log_in</a>
            </p>
        </form>
    </div>
    <footer style="background: #14213d; color: white; text-align: center; padding: 2rem 0; margin-top: 4rem;">
        <div class="container">
            <div style="display: flex; justify-content: center; gap: 2rem; flex-wrap: wrap; margin-bottom: 1rem;">
                <a href="home.html" style="color: white; text-decoration: none;">Home</a>
                <a href="order.html" style="color: white; text-decoration: none;">Order</a>
                <a href="contact.html" style="color: white; text-decoration: none;">Contact_Us</a>
                <a href="signup.html" style="color: white; text-decoration: none;">My_Account</a>
                <a href="signin.html" style="color: white; text-decoration: none;">Sign_In</a>
            </div>
            <p>&copy; TECH SHOP ALL RIGHTS RESERVED 2026</p>
        </div>
    </footer>
    <script src="script.js"></script>
</body>

</html>
