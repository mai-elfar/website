<!DOCTYPE html>
<html lang="ar" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order-TECH</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <header>
        <nav class="container">
            <div class="logo">TECH SHOP</div>
            <ul class="nav-links">
                <li><a href="home.html">Home</a></li>
                <li><a href="order.html">Order</a></li>
                <li><a href="contact.html">Contact_Us</a></li>
                <li><a href="signup.html">My_Account</a></li>
                <li><a href="signin.html" onclick="logout()">Sign_Up</a></li>
            </ul>
        </nav>
    </header>

    <section class="order-section">
        <div class="container">
            <h2 class="section-title" style="margin-bottom: 2rem;">
                <i class="fas fa-shopping-cart"></i> Order Done
            </h2>

            <div class="order-form">
                <div style="text-align: center; margin-bottom: 2rem;">
                    <h3 id="order-product" style="color: #14213d; margin-bottom: 0.5rem;">My_Order</h3>
                    <p style="font-size: 1.2rem; color: #333;">price: <span id="order-price">$0</span></p>
                </div>

                <form onsubmit="event.preventDefault(); completeOrder();">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Full_Name</label>
                            <input type="text" id="customer-name" required>
                        </div>
                        <div class="form-group">
                            <label>Phone</label>
                            <input type="tel" id="phone" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>City</label>
                            <input type="text" id="city" required>
                        </div>
                        <div class="form-group">
                            <label>Code</label>
                            <input type="text" id="postal-code" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Address</label>
                        <textarea id="address" rows="3"
                            style="width: 100%; padding: 12px; border: 2px solid #e1e5e9; border-radius: 8px; font-size: 1rem;"
                            required></textarea>
                    </div>

                    <div class="form-group">
                        <label>Notes(option)</label>
                        <textarea id="notes" rows="3"
                            style="width: 100%; padding: 12px; border: 2px solid #e1e5e9; border-radius: 8px; font-size: 1rem;"></textarea>
                    </div>

                    <div class="total-price">
                        <span>total-price: </span>
                        <span id="total-price">$0</span>
                    </div>

                    <button type="submit" class="btn" style="font-size: 1.3rem; padding: 15px;">
                        <i class="fas fa-check"></i> Order Done
                    </button>
                </form>
            </div>
        </div>
    </section>

    <footer style="background: #14213d; color: white; text-align: center; padding: 2rem 0; margin-top: 4rem;">
        <div class="container">
            <div style="display: flex; justify-content: center; gap: 2rem; flex-wrap: wrap; margin-bottom: 1rem;">
                <a href="home.html" style="color: white; text-decoration: none;">Home</a>
                <a href="order.html" style="color: white; text-decoration: none;">Order</a>
                <a href="contact.html" style="color: white; text-decoration: none;">Contact_Us</a>
                <a href="signup.html" style="color: white; text-decoration: none;">My_Account</a>
                <a href="signin.html" style="color: white; text-decoration: none;">Sign_In</a>
            </div>
            <p>&copy; TECH SHOP ALL RIGHTS RESERVED 2026</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
